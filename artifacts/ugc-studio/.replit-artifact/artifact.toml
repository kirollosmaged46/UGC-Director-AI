kind = "web"
previewPath = "/"
title = "UGC AI Ad Studio"
version = "1.0.0"
id = "artifacts/ugc-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "PORT=8080 pnpm --filter @workspace/api-server run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ugc-studio", "run", "build" ]
publicDir = "artifacts/ugc-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
BASE_PATH = "/"
