openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and image operations
  - name: ugc
    description: UGC content generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /ugc/generate:
    post:
      operationId: generateUgcContent
      tags: [ugc]
      summary: Generate UGC content from a product image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateUgcBody"
      responses:
        "200":
          description: Generated UGC images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateUgcResponse"
  /ugc/hooks:
    post:
      operationId: generateUgcHooks
      tags: [ugc]
      summary: Generate social media hooks and captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateHooksBody"
      responses:
        "200":
          description: Generated hooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateHooksResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    GenerateUgcBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded product image
        angle:
          type: string
          description: Camera angle directive
        lighting:
          type: string
          description: Lighting mood
        aspectRatio:
          type: string
          description: Output aspect ratio
        count:
          type: integer
          description: Number of images to generate (1-3)
        contentType:
          type: string
          description: Type of content - photo or video_concept
        creativeVision:
          type: string
          description: Creative director instructions from AI chat
        platform:
          type: string
          description: Target social media platform
      required:
        - imageBase64
        - angle
        - lighting
        - aspectRatio
        - count
        - contentType
    GenerateUgcResponse:
      type: object
      properties:
        images:
          type: array
          items:
            type: object
            properties:
              b64_json:
                type: string
              index:
                type: integer
            required:
              - b64_json
              - index
        videoConcepts:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              storyboard:
                type: string
              index:
                type: integer
            required:
              - title
              - storyboard
              - index
      required:
        - images
    GenerateHooksBody:
      type: object
      properties:
        productDescription:
          type: string
        platform:
          type: string
        tone:
          type: string
        imageContext:
          type: string
      required:
        - productDescription
        - platform
    GenerateHooksResponse:
      type: object
      properties:
        hooks:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              platform:
                type: string
            required:
              - text
              - platform
      required:
        - hooks
