openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and image operations
  - name: ugc
    description: UGC content generation operations
  - name: adgen
    description: AI video ad generation pipeline
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: |
            Server-Sent Events (SSE) stream of assistant text chunks.

            Each SSE event is a `data:` line containing a JSON object with one of these shapes:
            - Streaming chunk: `{ "content": "<partial text>" }`
            - Stream complete: `{ "done": true, "brief": "<1-3 sentence creative brief>" }`
            - Error: `{ "error": "<message>" }`

            The `brief` field in the done event contains a structured creative brief
            extracted from the full response, optimized for use as an image generation prompt.
            If brief extraction fails, `brief` may be absent — clients should fall back to the
            accumulated `content` text in that case.
          content:
            text/event-stream: {}
  /ugc/generate:
    post:
      operationId: generateUgcContent
      tags: [ugc]
      summary: Generate UGC content from a product image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateUgcBody"
      responses:
        "200":
          description: Generated UGC images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateUgcResponse"
  /ugc/hooks:
    post:
      operationId: generateUgcHooks
      tags: [ugc]
      summary: Generate social media hooks and captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateHooksBody"
      responses:
        "200":
          description: Generated hooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateHooksResponse"
  /adgen/generate:
    post:
      operationId: adgenGenerate
      tags: [adgen]
      summary: Start a UGC ad generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdgenGenerateBody"
      responses:
        "200":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdgenJobStarted"
  /adgen/status/{jobId}:
    get:
      operationId: adgenStatus
      tags: [adgen]
      summary: Poll ad generation job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdgenJobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdgenError"
  /adgen/regenerate/{jobId}:
    post:
      operationId: adgenRegenerate
      tags: [adgen]
      summary: Regenerate ad from an existing job's inputs
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdgenJobStarted"
        "404":
          description: Original job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdgenError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    GenerateUgcBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded product image
        angle:
          type: string
          enum: [us-vs-them, before-after, social-proof]
          description: "Ad angle / narrative strategy: us-vs-them (competitive comparison), before-after (transformation), social-proof (community endorsement)"
        lighting:
          type: string
          enum: [golden-hour, studio-white, moody-dark, outdoor-natural, neon]
          description: Lighting mood
        aspectRatio:
          type: string
          enum: ["9:16", "1:1", "4:5", "16:9"]
          description: Output aspect ratio
        count:
          type: integer
          minimum: 1
          maximum: 3
          description: Number of images to generate (1-3). Ignored for video — always produces 1 video.
        contentType:
          type: string
          enum: [photo, video]
          description: "Type of content. Note: 'both' is handled client-side by issuing two separate requests."
        creativeVision:
          type: string
          description: Creative director instructions from AI chat
        platform:
          type: string
          enum: [tiktok, instagram, youtube]
          description: Target social media platform
      required:
        - imageBase64
        - angle
        - lighting
        - aspectRatio
        - count
        - contentType
    GenerateUgcResponse:
      type: object
      properties:
        images:
          type: array
          items:
            type: object
            properties:
              b64_json:
                type: string
              index:
                type: integer
              aspectRatio:
                type: string
                enum: ["9:16", "1:1", "4:5", "16:9"]
                description: Aspect ratio used for this image
            required:
              - b64_json
              - index
              - aspectRatio
        videoUrl:
          type: string
          description: "Signed GCS URL for the generated .mp4 video (valid 24h). Present only when contentType=video."
      required:
        - images
    GenerateHooksBody:
      type: object
      properties:
        productDescription:
          type: string
        platform:
          type: string
          enum: [tiktok, instagram, youtube]
        tone:
          type: string
        imageContext:
          type: string
        count:
          type: integer
          minimum: 3
          maximum: 5
          default: 5
          description: Number of hooks to generate (3-5)
      required:
        - productDescription
        - platform
    GenerateHooksResponse:
      type: object
      properties:
        hooks:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              platform:
                type: string
            required:
              - text
              - platform
      required:
        - hooks
    AdgenGenerateBody:
      type: object
      properties:
        productName:
          type: string
        productCategory:
          type: string
          enum: [skincare, supplement, fashion, "food & beverage", home, tech, other]
        productDescription:
          type: string
        adAngle:
          type: string
          enum: [us-vs-them, before-after, social-proof]
        platform:
          type: string
          enum: [tiktok, "instagram-reels", "youtube-shorts"]
        aspectRatio:
          type: string
          enum: ["9:16", "1:1", "4:5"]
        productImageBase64:
          type: string
          description: Optional base64-encoded product image
        referenceVideoBase64:
          type: string
          description: Optional base64-encoded reference video for style matching
        creatorAvatarBase64:
          type: string
          description: Optional base64-encoded creator avatar for talking head
        hookStyle:
          type: string
          enum: [question, "bold-statement", "mid-action", "shocking-fact", "i-tried-this"]
        voiceoverLanguage:
          type: string
          enum: [english, arabic]
          default: english
        creativeVision:
          type: string
          description: Optional creative direction text
      required:
        - productName
        - productCategory
        - productDescription
        - adAngle
        - platform
        - aspectRatio
    AdgenJobStarted:
      type: object
      properties:
        jobId:
          type: string
      required:
        - jobId
    AdgenJobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, running, done, failed]
        currentStep:
          type: string
        stepIndex:
          type: integer
        totalSteps:
          type: integer
        audioWarning:
          type: string
          description: Warning message if voiceover generation failed but pipeline continued
        result:
          type: object
          properties:
            videoUrl:
              type: string
            hook:
              type: string
            hookVariants:
              type: array
              items:
                type: string
            caption:
              type: string
            script:
              type: object
      required:
        - jobId
        - status
        - stepIndex
        - totalSteps
    AdgenError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
